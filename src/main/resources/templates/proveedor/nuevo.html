<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="layout :: layoutBase(~{::contenido})">
<div th:fragment="contenido">
    <div class="container mt-5">
        <div class="card shadow-lg">
            <div class="card-body">
                <h1 class="card-title text-center">Proveedor Nuevo</h1>
                <div class="row d-flex justify-content-center">
                    <div class="col-md-6">
                        <form id="form-proveedor" th:action="@{/proveedor/registrar}" th:object="${proveedor}" class="row g-2" method="post" novalidate>
                            <div class="col-md-12 position-relative">
                                <label for="razonSocial" class="form-label">Razon Social</label>
                                <input type="text" class="form-control" th:field="*{razonSocial}" placeholder="Ingrese razon social" required>
                            </div>
                            <div class="col-md-6 position-relative">
                                <label for="ruc" class="form-label">RUC</label>
                                <input type="text" class="form-control" th:field="*{ruc}" placeholder="12345678901" maxlength="11" required>
                            </div>
                            <div class="col-md-6 position-relative">
                                <label for="celular" class="form-label">Celular</label>
                                <input type="text" class="form-control" th:field="*{celular}" placeholder="999888777" required>
                            </div>
                            <div class="col-md-12 position-relative">
                                <label for="email" class="form-label">Email</label>
                                <input type="email" class="form-control" th:field="*{email}" placeholder="correo@empresa.com" required>
                            </div>
                            <div class="col-md-12 position-relative">
                                <label for="descripcion" class="form-label">Descripcion</label>
                                <textarea class="form-control" th:field="*{descripcion}" rows="3" placeholder="Descripcion del proveedor"></textarea>
                            </div>
                            <div class="col-md-12 d-flex justify-content-between">
                                <a th:href="@{/proveedor/listado}" class="btn btn-outline-dark">
                                    <i class="fa-solid fa-reply"></i> Regresar
                                </a>
                                <button type="submit" class="btn btn-primary">
                                    <i class="fa-solid fa-floppy-disk"></i> Registrar
                                </button>
                                <button type="reset" class="btn btn-secondary">
                                    <i class="fa-solid fa-broom"></i> Limpiar
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <th:block th:utext="${alert}"></th:block>
    <script type="text/javascript">
        $(document).ready(function () {
            $("#form-proveedor").validate({
                rules: {
                    razonSocial: { required: true },
                    ruc: { required: true, digits: true, minlength: 11, maxlength: 11 },
                    celular: { required: true, digits: true, minlength: 9, maxlength: 9 },
                    email: { required: true, email: true }
                },
                messages: {
                    razonSocial: { required: "campo requerido" },
                    ruc: {
                        required: "campo requerido",
                        digits: "solo dígitos",
                        minlength: "debe tener 11 dígitos",
                        maxlength: "debe tener 11 dígitos"
                    },
                    celular: {
                        required: "campo requerido",
                        digits: "solo dígitos",
                        minlength: "debe tener 9 dígitos",
                        maxlength: "debe tener 9 dígitos"
                    },
                    email: { required: "campo requerido", email: "correo inválido" }
                },
                errorElement: 'div',
                errorClass: 'invalid-tooltip',
                highlight: function (element) {
                    $(element).addClass('is-invalid').removeClass('is-valid');
                },
                unhighlight: function (element) {
                    $(element).removeClass('is-invalid').addClass('is-valid');
                }
            });
        });
    </script>
</div>
</html>
